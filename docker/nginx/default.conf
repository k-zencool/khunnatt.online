# =============================================================================
# docker/nginx/default.conf
# Nginx virtual host for khunnatt.online (local dev mirrors shared-host setup)
# =============================================================================

server {
    listen 80;
    server_name localhost khunnatt.online;

    root  /var/www/html;
    index index.php index.html;

    charset utf-8;

    # ── Client limits ──────────────────────────────────────────────────────────
    client_max_body_size 32M;

    # ── Logging ────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ── Security headers ───────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"           always;
    add_header X-Content-Type-Options    "nosniff"              always;
    add_header X-XSS-Protection          "1; mode=block"        always;
    add_header Referrer-Policy           "strict-origin"        always;
    add_header Permissions-Policy        "camera=(), microphone=()" always;

    # ── Main routing ───────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM passthrough ────────────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass   php:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        include        fastcgi_params;

        fastcgi_read_timeout 120;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # ── Static asset caching ───────────────────────────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|webp|svg|ico|woff2?)$ {
        expires    30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Block sensitive files ──────────────────────────────────────────────────
    location ~ /\.(ht|env|git) {
        deny all;
        return 404;
    }

    location ~ \.(sql|log|md|yaml|yml)$ {
        deny all;
        return 404;
    }

    # ── Block direct access to PHP in uploads ──────────────────────────────────
    location ~ ^/uploads/.*\.php$ {
        deny all;
        return 403;
    }
}
