# =============================================================================
# docker-compose.yml — khunnatt.online local development stack
#
# Services:
#   nginx     → http://localhost:8888  (web server / reverse proxy)
#   php       → internal FPM socket
#   db        → MariaDB 10.11
#   phpmyadmin→ http://localhost:8088
#
# Usage:
#   docker compose up -d          # start all services
#   docker compose down -v        # stop + remove volumes
#   docker compose logs -f nginx  # tail a service log
# =============================================================================

services:

  # ── Nginx Web Server ────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: khunnatt_nginx
    restart: unless-stopped
    ports:
      - "8888:80"
    volumes:
      - ./:/var/www/html:ro              # mount project (read-only to nginx)
      - ./uploads:/var/www/html/uploads  # uploads must be writable
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      php:
        condition: service_started
    networks:
      - khunnatt_net

  # ── PHP-FPM 8.3 ─────────────────────────────────────────────────────────────
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: khunnatt_php
    restart: unless-stopped
    volumes:
      - ./:/var/www/html                 # full read-write for PHP writes
    environment:
      # These are read by includes/config.php via getenv()
      DB_HOST: db
      DB_NAME: khunnatt_db
      DB_USER: khunnatt_user
      DB_PASS: khunnatt_pass
    depends_on:
      db:
        condition: service_healthy
    networks:
      - khunnatt_net

  # ── MariaDB 10.11 ────────────────────────────────────────────────────────────
  db:
    image: mariadb:10.11
    container_name: khunnatt_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_secret_change_me
      MYSQL_DATABASE: khunnatt_db
      MYSQL_USER: khunnatt_user
      MYSQL_PASSWORD: khunnatt_pass
    volumes:
      - db_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro  # runs on first boot
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_secret_change_me", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - khunnatt_net

  # ── phpMyAdmin ───────────────────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:5.2-apache
    container_name: khunnatt_phpmyadmin
    restart: unless-stopped
    ports:
      - "8088:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: khunnatt_user
      PMA_PASSWORD: khunnatt_pass
      UPLOAD_LIMIT: 128M
    depends_on:
      db:
        condition: service_healthy
    networks:
      - khunnatt_net

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  khunnatt_net:
    driver: bridge

# ── Named Volumes ─────────────────────────────────────────────────────────────
volumes:
  db_data:
    driver: local
