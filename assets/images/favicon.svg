<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0%" y1="15%" x2="100%" y2="85%">
      <stop offset="0%"   stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#06ffd2"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#041628"/>
      <stop offset="100%" stop-color="#020B18"/>
    </linearGradient>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0EA5E9" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#06ffd2" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="aura" cx="50%" cy="55%" r="45%">
      <stop offset="0%"   stop-color="#0EA5E9" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="clip">
      <rect width="100" height="100" rx="22"/>
    </clipPath>
  </defs>

  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <ellipse cx="50" cy="58" rx="38" ry="32" fill="url(#aura)" clip-path="url(#clip)"/>
  <path d="M22 0 Q100 0 100 22 L100 0 Z" fill="white" opacity="0.03" clip-path="url(#clip)"/>
  <path d="M0 22 Q0 0 22 0 L0 0 Z"        fill="white" opacity="0.04" clip-path="url(#clip)"/>
  <rect x="1" y="1" width="98" height="98" rx="21.2"
        fill="none" stroke="url(#border)" stroke-width="1.5"/>
  <text
    x="50" y="64"
    text-anchor="middle"
    font-family="system-ui,-apple-system,'SF Pro Display','Helvetica Neue',sans-serif"
    font-weight="800"
    font-size="44"
    letter-spacing="-2"
    fill="url(#g)"
    filter="url(#glow)">KN</text>
</svg>
